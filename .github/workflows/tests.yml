name: tests

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -U pip
      - run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check .
      - name: Build wheel and sdist
        run: python -m build
      - name: Install built wheel smoke
        run: |
          python -m venv /tmp/braille-wheel-smoke
          /tmp/braille-wheel-smoke/bin/python -m pip install -U pip
          /tmp/braille-wheel-smoke/bin/pip install dist/*.whl
          /tmp/braille-wheel-smoke/bin/braille-dotmatrix --help

  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -U pip
      - run: pip install -e ".[dev]"
      - run: pytest -q --cov=braille_dotmatrix_engine --cov-report=term-missing --junitxml=pytest-${{ matrix.python-version }}.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-${{ matrix.python-version }}
          path: pytest-${{ matrix.python-version }}.xml

  brf-batch-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -U pip
      - run: pip install -e ".[dev]"
      - name: Generate BRF batch report
        run: |
          mkdir -p artifacts/brf
          braille-dotmatrix \
            --brf-preflight-batch examples/brf \
            --brf-batch-pattern "*.txt" \
            --brf-print-summary \
            --report-json artifacts/brf/brf_batch_report.json
      - name: Validate BRF batch report aggregate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path('artifacts/brf/brf_batch_report.json').read_text(encoding='utf-8'))
          aggregate = report['batch']['aggregate']
          assert report['mode'] == 'BRF_PREFLIGHT_BATCH'
          assert aggregate['total_files'] == 3
          assert aggregate['ok_files'] == 1
          assert aggregate['warning_count'] == 1
          assert aggregate['error_count'] == 1
          assert aggregate['issue_files'] == 2
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: brf-batch-report
          path: artifacts/brf/brf_batch_report.json
          if-no-files-found: error
          retention-days: 7

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -U pip
      - run: pip install -e ".[dev]"
      - name: Run benchmark smoke suite
        run: |
          python -m braille_dotmatrix_engine.benchmark \
            --output-dir artifacts/benchmarks \
            --csv artifacts/benchmarks/benchmark.csv \
            --summary artifacts/benchmarks/benchmark_summary.json \
            --max-runtime-sec 120 \
            --max-rss-mb 4096
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-smoke
          path: artifacts/benchmarks
          retention-days: 7
